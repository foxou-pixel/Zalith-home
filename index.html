<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zalith Home</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500&display=swap');

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2330;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --tag-bg: #1f2d3d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    min-height: 100vh;
    padding: 12px;
  }

  h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .header-logo {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent), #a371f7);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .header-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
  }

  .header-time {
    margin-left: auto;
    font-size: 11px;
    color: var(--muted);
    text-align: right;
  }

  /* Grid layout */
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .col-full { grid-column: 1 / -1; }

  /* Section */
  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .section-header h2 {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
  }

  .section-icon { font-size: 13px; }

  .badge {
    margin-left: auto;
    background: var(--tag-bg);
    color: var(--accent);
    border: 1px solid var(--accent);
    border-radius: 20px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 600;
  }

  .badge.green {
    color: var(--accent2);
    border-color: var(--accent2);
  }

  /* Cards list */
  .card-list { padding: 6px; display: flex; flex-direction: column; gap: 5px; }

  .card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 10px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    text-decoration: none;
    color: inherit;
    display: block;
  }

  .card:hover {
    border-color: var(--accent);
    background: var(--surface2);
  }

  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-meta {
    font-size: 10px;
    color: var(--muted);
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--accent);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 9px;
    font-weight: 600;
  }

  .tag.green { color: var(--accent2); background: #1a2d1e; }

  /* Release card */
  .release-version {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
    font-family: 'Space Grotesk', sans-serif;
  }

  .release-notes {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
    line-height: 1.5;
    max-height: 50px;
    overflow: hidden;
  }

  /* Loading / error */
  .loading {
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 11px;
  }

  .dot-anim::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  /* Scrollable */
  .scrollable { max-height: 280px; overflow-y: auto; }
  .scrollable::-webkit-scrollbar { width: 4px; }
  .scrollable::-webkit-scrollbar-track { background: transparent; }
  .scrollable::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⛏</div>
  <div>
    <div class="header-title">Zalith Launcher 2</div>
    <div class="header-sub">Home · News & Updates</div>
  </div>
  <div class="header-time" id="clock"></div>
</div>

<div class="grid">

  <!-- Zalith Releases -->
  <div class="section col-full">
    <div class="section-header">
      <span class="section-icon">🚀</span>
      <h2>Mises à jour Zalith Launcher 2</h2>
      <span class="badge green" id="zl-badge">Chargement...</span>
    </div>
    <div class="scrollable">
      <div class="card-list" id="zl-releases">
        <div class="loading dot-anim">Récupération des releases GitHub</div>
      </div>
    </div>
  </div>

  <!-- Minecraft News -->
  <div class="section col-full">
    <div class="section-header">
      <span class="section-icon">🌍</span>
      <h2>News Minecraft Java</h2>
      <span class="badge" id="mc-badge">Chargement...</span>
    </div>
    <div class="scrollable">
      <div class="card-list" id="mc-news">
        <div class="loading dot-anim">Récupération des articles</div>
      </div>
    </div>
  </div>

</div>

<script>
// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('clock').innerHTML =
    now.toLocaleDateString('fr-FR', {weekday:'short', day:'numeric', month:'short'}) +
    '<br>' + now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}
updateClock();
setInterval(updateClock, 1000);

// Time ago
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 3600) return `il y a ${Math.floor(diff/60)}min`;
  if (diff < 86400) return `il y a ${Math.floor(diff/3600)}h`;
  if (diff < 604800) return `il y a ${Math.floor(diff/86400)}j`;
  return new Date(dateStr).toLocaleDateString('fr-FR');
}

// Zalith GitHub Releases
async function loadZalithReleases() {
  const container = document.getElementById('zl-releases');
  const badge = document.getElementById('zl-badge');
  try {
    const res = await fetch('https://api.github.com/repos/ZalithLauncher/ZalithLauncher2/releases?per_page=8');
    if (!res.ok) throw new Error();
    const data = await res.json();
    badge.textContent = data[0]?.tag_name || 'GitHub';
    badge.className = 'badge green';
    container.innerHTML = data.map(r => {
      const notes = r.body
        ? r.body.replace(/#+\s*/g,'').replace(/\*\*/g,'').split('\n').filter(l=>l.trim()&&!l.startsWith('<!--')).slice(0,3).join(' · ')
        : 'Pas de notes de version.';
      return `<a class="card" href="${r.html_url}" target="_blank">
        <div class="release-version">${r.tag_name} ${r.prerelease ? '<span class="tag">pre-release</span>' : '<span class="tag green">stable</span>'}</div>
        <div class="release-notes">${notes.substring(0,140)}${notes.length>140?'…':''}</div>
        <div class="card-meta" style="margin-top:5px">${timeAgo(r.published_at)}</div>
      </a>`;
    }).join('');
  } catch(e) {
    badge.textContent = 'Erreur';
    container.innerHTML = `<div class="loading">Impossible de charger les releases.<br>Vérifie ta connexion.</div>`;
  }
}

// Minecraft News via RSS2JSON
async function loadMinecraftNews() {
  const container = document.getElementById('mc-news');
  const badge = document.getElementById('mc-badge');
  try {
    const rss = 'https://www.minecraft.net/en-us/feeds/community-content/articles.xml';
    const api = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}&count=8`;
    const res = await fetch(api);
    if (!res.ok) throw new Error();
    const data = await res.json();
    if (data.status !== 'ok') throw new Error();
    badge.textContent = `${data.items.length} articles`;
    container.innerHTML = data.items.map(item => {
      const category = item.categories?.[0] || 'Article';
      const desc = item.description?.replace(/<[^>]+>/g,'').trim().substring(0,100) || '';
      return `<a class="card" href="${item.link}" target="_blank">
        <div class="card-title">${item.title}</div>
        <div style="font-size:10px;color:var(--muted);margin-bottom:3px">${desc}${desc.length>=100?'…':''}</div>
        <div class="card-meta"><span class="tag">${category}</span>${timeAgo(item.pubDate)}</div>
      </a>`;
    }).join('');
  } catch(e) {
    badge.textContent = 'Erreur';
    container.innerHTML = `<div class="loading">Impossible de charger les news Minecraft.<br>Vérifie ta connexion.</div>`;
  }
}

loadZalithReleases();
loadMinecraftNews();
</script>
</body>
</html>
